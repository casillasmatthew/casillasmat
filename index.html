<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Matthew Casillas | Portfolio</title>
  <meta name="description" content="Matthew Casillas - Art 10c Portfolio">

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- 3D Model Viewer Library -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <nav>
      <div class="logo">MyBrand.</div>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main>

    <!-- Hero Section -->
    <section id="hero" class="hero section-padding reveal">
      <div class="container hero-content">
        <h1 class="title">Hello, I'm <br><span class="highlight text-gradient">Matthew Casillas</span></h1>
        <p class="description">I'm a second year at Santa Monica College and this is my Art 10c Portfolio.</p>
        <div class="hero-cta">
          <a href="Large%20Format%20Print.pdf" class="btn-primary" target="_blank">View My Work</a>
          <a href="#projects" class="btn-secondary">View Project 1</a>
        </div>
      </div>
      <div class="hero-graphic">
        <!-- Abstract glowing orb -->
        <div class="orb"></div>
        <div class="orb orb-2"></div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects-section">
      <div class="section-container">
        <h2>Featured Work</h2>
        <div class="project-grid">

          <!-- Project 1 (Image displayed directly on the site, 25% width) -->
          <div class="project-card">
            <img src="Project1.png" alt="Project 1 preview" class="project-image" style="max-width: 25%; border-radius: 8px;">
            <div class="project-info">
              <h3>Project 1</h3>
            </div>
          </div>

        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <div class="container footer-content">
      <div class="footer-logo">MC<span class="highlight">.</span></div>
      <p class="copyright">&copy; 2026 Matthew Casillas.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
