<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO: Search engines read these to understand your page -->
  <title>Your Name | Portfolio</title>
  <meta name="description" content="A brief description of your awesome project or portfolio.">

  <!-- Typography: Importing 'Inter' from Google Fonts for a premium look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- CSS: Link to your stylesheet (make sure you have a style.css file) -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <nav>
      <div class="logo">MyBrand.</div>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main>

    <!-- Hero Section: The first thing visitors see -->
    <section id="hero" class="hero">
      <h1>Hello, I'm <span class="highlight">Your Name</span></h1>
      <p>I build elegant and dynamic web applications.</p>
      <a href="#projects" class="btn-primary">View My Work</a>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects-section">
      <div class="section-container">
        <h2>Featured Work</h2>
        <div class="project-grid">

          <!-- Project 1 (Image displayed directly on the site) -->
          <div class="project-card">
            <!-- Ensure you have an image file named project1.png in the same directory -->
            <img src="project1.png" alt="Project 1 preview" class="project-image" style="max-width: 100%; border-radius: 8px;">
            <div class="project-info">
              <h3>Project 1</h3>
              <p>An amazing web application showcasing modern design trends and complex functionality.</p>
            </div>
          </div>

        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Your Name. Built with HTML & CSS.</p>
  </footer>

  <!-- JavaScript: Link to your logic scripts at the bottom for faster page load -->
  <script src="script.js"></script>
</body>
</html>
