<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Matthew Casillas | Portfolio</title>
  <meta name="description" content="Matthew Casillas - Art 10c Portfolio">

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- 3D Model Viewer Library -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

  <!-- Navigation Bar -->
  <header id="navbar">
    <nav class="container">
      <div class="logo">MC<span class="highlight">.</span></div>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main>

    <!-- Hero Section -->
    <section id="hero" class="hero section-padding reveal">
      <div class="container hero-content">
        <h1 class="title">Hello, I'm <br><span class="highlight text-gradient">Matthew Casillas</span></h1>
        <p class="description">I'm a second year at Santa Monica College and this is my Art 10c Portfolio.</p>
        <div class="hero-cta">
          <a href="Large%20Format%20Print.pdf" class="btn-primary" target="_blank">View My Work</a>
          <a href="Project1.png" class="btn-secondary" target="_blank">Project 1</a>
        </div>
      </div>
      <div class="hero-graphic">
        <!-- Abstract glowing orb -->
        <div class="orb"></div>
        <div class="orb orb-2"></div>
      </div>
    </section>

    <!-- 3D Model Section -->
    <section id="3d-model" class="model-container section-padding reveal">
      <div class="container">
        <h2 class="section-title text-center">3D Artifact <span class="highlight">Study</span></h2>
        <div class="divider center"></div>
        <model-viewer
            src="museum.glb"
            alt="A 3D model of a creative artifact"
            shadow-intensity="1"
            camera-controls
            auto-rotate
            ar>
        </model-viewer>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <div class="container footer-content">
      <div class="footer-logo">MC<span class="highlight">.</span></div>
      <p class="copyright">&copy; 2026 Matthew Casillas.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
